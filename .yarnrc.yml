compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules

# semantic-ui-react and its transitive dependencies declare React <=18 as
# peer deps, but the app runs React 19 with a findDOMNode compatibility
# shim (src/polyfills/fluentui-react-component-ref.tsx).  Silence only
# these specific warnings — other peer dependency issues will still surface.
logFilters:
  - pattern: "semantic-ui-react and other dependencies request*"
    level: discard
  - pattern: "Some peer dependencies are incorrectly met*"
    level: discard

yarnPath: .yarn/releases/yarn-4.13.0.cjs
